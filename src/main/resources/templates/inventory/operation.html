<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>入荷記録</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body>
    <div th:replace="~{fragments/common :: pageHeader('入荷記録', 'inventory')}"></div>

    <div class="content-form">
        <form th:action="@{/inventory/operation}" method="post" th:object="${inventoryForm}">
            <input type="hidden" name="transactionType" value="IN"/>
            
            <div>
                <label>材料名:</label>
                <select th:field="*{materialId}" required>
                    <option value="">選択してください</option>
                    <optgroup label="原料">
                        <option th:each="r : ${rawList}" 
                                th:value="${r.id}" 
                                th:text="${r.name}"></option>
                    </optgroup>
                    <optgroup label="添加物">
                        <option th:each="a : ${additiveList}" 
                                th:value="${a.id}" 
                                th:text="${a.name}"></option>
                    </optgroup>
                </select>
            </div>
            
            <div>
                <label>産地:</label>
                <input type="text" th:field="*{origin}" required placeholder="例: 北海道">
            </div>

            <div>
                <label>賞味期限:</label>
                <input type="date" th:field="*{expiryDate}" required>
            </div>

            <div>
                <label>ロット番号:</label>
                <input type="text" th:field="*{lotNumber}" required>
            </div>

            <div>
                <label>入荷数量:</label>
                <input type="number" th:field="*{quantity}" min="1" required>
            </div>
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-save">登録する</button>
                <a th:href="@{/inventory/list}" class="btn btn-back">キャンセル</a>
            </div>
        </form>
    </div>
</body>
</html>
