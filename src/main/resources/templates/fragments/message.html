<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>フラッシュメッセージ</title>
</head>
<body>
	<div th:fragment="flash-message" 
	         th:if="${message}" 
	         th:text="${message}" 
	         th:classappend="${msgType != null} ? 'msg-' + ${msgType}" 
	         class="flash-message">
	</div>
</body>
</html>
