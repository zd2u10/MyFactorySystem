<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	
	<div th:fragment="input-fields(formObject)">
	    <div>
	        <label>名前：</label>
	        <input type="text" id="regName" th:field="*{name}" />
	        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
	    </div>
	    <div>
	        <label>単位：</label>
	        <input type="text" th:field="*{unit}" placeholder="例:kg,g,ml" />
	        <div class="error" th:if="${#fields.hasErrors('unit')}" th:errors="*{unit}"></div>
	    </div>
	</div>

	<dialog th:fragment="confirm-modal" id="confirmModal">
	    <h3>登録情報の確認</h3>
	    <div id="confirmContent" style="font-weight: bold; margin: 10px 0;"></div>
	    <button type="button" onclick="submitForm('registerForm')">確定</button>
	    <button type="button" onclick="closeModal('confirmModal')">キャンセル</button>
	</dialog>
	
</body>
</html>
