<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>原料の登録</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<script th:src="@{/js/common.js}"></script>
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('/material', '原料の登録', 'register')}"></header>

	<form id="registerForm" th:action="@{/material/register}" method="post" th:object="${materialForm}">
	    <div th:replace="~{fragments/input :: text('原料名', 'name', 'regName')}"></div>
	    <div th:replace="~{fragments/input :: text('単位', 'unit', 'regUnit')}"></div>
	    <div th:replace="~{fragments/input :: radio-powder('種類', 'isPowder', 'regIsPwoder')}"></div>
	    
	    <button type="button" class="btn btn-action"
	        	onclick="openConfirmModal('registerForm', 'confirmModal', 'confirmContent', 
				['regName', 'regUnit', 'regIsPowder'], ['原料名', '単位', '種類'],'登録')">登録</button>
	</form>
	<dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
