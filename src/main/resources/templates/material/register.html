<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>原料の登録</title>
<link rel="stylesheet" th:href="@{/css/material/material-common.css}" />
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('原料の登録')}"></header>
	
	<hr />
	
	<form id="materialForm" th:action="@{/material/register}" method="post" th:object="${material}">
		<div>
			<label>原料名：</label>
			<input type="text" id="name" th:field="*{name}" required/>
		</div>
		
		<div>
			<label>単位：</label>
			<input type="text" th:field="*{unit}" placeholder="例:kg,g,ml" required/>
		</div>
		
		<div>
			<label>正味量：</label>
			<input type="number" step="0.01" min="0" th:field="*{netWeight}" required/>
		</div>
		
		<button type="button" onclick="openConfirmModal()">登録する</button>
	</form>
	
	<dialog id="confirmModal">
		<h3>登録情報の確認</h3>
		<p>以下の内容で登録しますか？</p>
		
		<div id="confirmContent" style="font-weight: bold; margin: 10px 0;"></div>
		
		<div class="modal-actions">
			<button type="button" onclick="submitForm()">登録確定</button>
			<button type="button" onclick="cancelModal()" style="background-color: #ccc;">キャンセル</button>
		</div>
	</dialog>
<script th:src="@{/js/material/common.js}" defer></script>
</body>
</html>
