<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>原料一覧表示</title>
</head>
<body>
	<h1>原料一覧</h1>
	
	<a th:href="@{/material/register}">登録画面へ</a>
	
	<table border="1" style="margin-top: 20px; border-collapse: collapse; width: 80%;">
		<thead>
			<tr>
				<th>ID</th>
				<th>原料名</th>
				<th>単位</th>
				<th>正味量</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="m : ${materialList}">
				<td th:text="${m.id}">ID</td>
				<td th:text="${m.name}">名前</td>
				<td th:text="${m.unit}">単位</td>
				<td th:text="${m.netWeight}">正味量</td>
			</tr>
		</tbody>
	</table>
	
</body>
</html>
