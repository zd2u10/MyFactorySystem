<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>原料一覧表示</title>
<link rel="stylesheet" th:href="@{/css/material/material-common.css}" />
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('原料一覧')}"></header>
	
	<div th:if="${message}" th:text="${message}" 
	     style="padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; background-color: #f9f9f9;">
	</div>
	
	
	<hr>
	
	<table border="1" style="margin-top: 20px; border-collapse: collapse; width: 80%;">
		<thead>
			<tr>
				<th>ID</th>
				<th>原料名</th>
				<th>単位</th>
				<th>正味量</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="m : ${materialList}">
				<td th:text="${m.id}">ID</td>
				<td th:text="${m.name}">名前</td>
				<td th:text="${m.unit}">単位</td>
				<td th:text="${m.netWeight}">正味量</td>
				<td>
					<a th:href="@{/material/edit/{id}(id=${m.id})}" class="btn btn-edit">編集</a>
					
					<form th:action="@{/material/delete/{id}(id=${m.id})}" method="post" style="display:inline;">
						<button type="submit" class="btn btn-delete" onclick="return confirm('この原料を無効化(削除)しますか？');">削除</button>
					</form>						
				</td>
			</tr>
		</tbody>
	</table>
	
</body>
</html>
