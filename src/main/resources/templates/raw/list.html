<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>原料一覧</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/raw', '原料一覧', 'list')}"></header>
	
	<div th:replace="~{fragments/message :: flash-message}"></div>

    <table class="content-table">
        <thead>
			<tr><th>ID</th><th>名前</th><th>単位</th><th>形態</th><th>操作</th></tr>
		</thead>
        <tbody>
            <tr th:each="r : ${rawList}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.name}"></td>
                <td th:text="${r.unit}"></td>
                <td th:text="${r.isPowder} ? '粉体' : '液体'"></td>
                <td>
                    <a th:href="@{/raw/edit/{id}(id=${r.id})}" class="btn btn-edit">編集</a>
                    <button type="button" class="btn btn-delete" th:onclick="openConfirmModal('deleteForm[[${r.id}]]', 
							'confirmModal', 'confirmContent', ['deleteName[[${r.id}]]'], ['原料'], '削除')">
                        削除
                    </button>
                    <form th:id="'deleteForm' + ${r.id}" th:action="@{/raw/delete/{id}(id=${r.id})}" method="post" style="display:none;">
                        <input type="hidden" th:id="'deleteName' + ${r.id}" th:value="${r.name}" />
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
