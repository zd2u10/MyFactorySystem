<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>削除済み原料一覧表示</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<script th:src="@{/js/common.js}"></script>
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('/raw', '削除済み原料一覧', 'deleted')}"></header>

	<div th:replace="~{fragments/message :: flash-message}"></div>
	
	<table class="content-table">
	    <thead><tr><th>ID</th><th>原料名</th><th>単位</th><th>操作</th></tr></thead>
	    <tbody>
	        <tr th:each="r : ${rawList}">
	            <td th:text="${r.id}"></td>
	            <td th:text="${r.name}"></td>
	            <td th:text="${r.unit}"></td>
	            <td>
	                <form th:id="'restoreForm' + ${r.id}" th:action="@{/raw/deleted/{id}(id=${r.id})}" method="post">
						
						<input type="hidden" th:id="'restoreName' + ${r.id}" th:value="${r.name}" style="display:none;"></input>
						<button type="button" class="btn btn-restore"
							   th:onclick="|openConfirmModal('restoreForm${r.id}','confirmModal', 'confirmContent', 
							   ['restoreName${r.id}'], ['復旧対象'], '復旧')|">復旧
						</button>
	                </form>
	            </td>
	        </tr>
	    </tbody>
	</table>
	<dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
