<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加物一覧</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
	<script th:src="@{/js/common.js}"></script>
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/additive', '添加物一覧', 'list')}"></header>

    <div th:if="${message}" th:text="${message}" class="error" style="color: green;"></div>

    <table class="content-table">
        <thead>
            <tr><th>ID</th><th>名前</th><th>単位</th><th>形態</th><th>操作</th></tr>
        </thead>
        <tbody>
            <tr th:each="a : ${additiveList}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.name}"></td>
                <td th:text="${a.unit}"></td>
                <td th:text="${a.isPowder} ? '粉体' : '液体'"></td>
                <td>
					<a th:href="@{/additive/edit/{id}(id=${a.id})}" class="btn btn-edit">編集</a>
					<button type="button" class="btn btn-delete" th:onclick="openConfirmModal('deleteForm[[${a.id}]]', 
					        'confirmModal', 'confirmContent', ['deleteName[[${a.id}]]'], ['添加物'])">
					削除
					</button>
					<form th:id="'deleteForm' + ${a.id}" th:action="@{/additive/delete/{id}(id=${a.id})}" method="post" style="display:none;">
						<input type="hidden" th:id="'deleteName' + ${a.id}" th:value="${a.name}" />
					</form>
                </td>
            </tr>
        </tbody>
    </table>
	<dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
