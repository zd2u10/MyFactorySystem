<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>添加物一覧表示</title>
<link rel="stylesheet" th:href="@{/css/material/material-common.css}" />
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('/additive', '添加物一覧')}"></header>
	
	<div th:if="${message}" th:text="${message}" 
	     style="padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; background-color: #f9f9f9;">
	</div>
	
	
	<hr>
	
	<table border="1" style="margin-top: 20px; border-collapse: collapse; width: 80%;">
		<thead>
			<tr>
				<th>ID</th>
				<th>添加物名</th>
				<th>単位</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="a : ${additiveList}">
				<td th:text="${a.id}">ID</td>
				<td th:text="${a.name}">名前</td>
				<td th:text="${a.unit}">単位</td>
				<td>
					<a th:href="@{/additive/edit/{id}(id=${a.id})}" class="btn btn-edit">編集</a>
					
					<form th:action="@{/additive/delete/{id}(id=${m.id})}" method="post" style="display:inline;">
						<button type="submit" class="btn btn-delete" onclick="return confirm('この原料を削除(無効化)しますか？');">削除</button>
					</form>						
				</td>
			</tr>
		</tbody>
	</table>
	
</body>
</html>
