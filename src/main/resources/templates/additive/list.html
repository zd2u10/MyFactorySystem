<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加物一覧</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/additive', '添加物一覧', 'list')}"></header>

    <div th:if="${message}" th:text="${message}" class="error" style="color: green;"></div>

    <table class="content-table">
        <thead>
            <tr><th>ID</th><th>名前</th><th>単位</th><th>形態</th><th>操作</th></tr>
        </thead>
        <tbody>
            <tr th:each="a : ${additiveList}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.name}"></td>
                <td th:text="${a.unit}"></td>
                <td th:text="${a.isPowder} ? '粉体' : '液体'"></td>
                <td>
                    <a th:href="@{/additive/edit/{id}(id=${a.id})}" class="btn btn-edit">編集</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
