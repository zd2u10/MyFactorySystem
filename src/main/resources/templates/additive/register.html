<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>添加物の登録</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<script th:src="@{/js/common.js}"></script>
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/additive', '添加物の登録')}"></header>
    
    <form id="registerForm" th:action="@{/additive/register}" method="post" th:object="${additiveForm}">
        <div th:replace="~{input :: field('添加物名', 'name', 'name')}"></div>
		<div＞ th:replace="~{input :: field('単位', 'unit', 'unit')}"></div>        
		
		<div>
		    <label>種類：</label>
		    <input type="radio" id="regPowder" th:field="*{isPowder}" th:value="true" />粉体
		    <input type="radio" id="regLiquid" th:field="*{isPowder}" th:value="false" />液体
		    
		</div>	
			
        <button type="button" 
			onclick="openConfirmModal(
				'regForm', 'confirmModal', 'confirmContent', 
				['regName'], ['添加物'])">登録する</button>
    </form>
    
    <dialog id="confirmModal" th:replace="~{input :: confirm-modal}"></dialog>
</body>
</html>
