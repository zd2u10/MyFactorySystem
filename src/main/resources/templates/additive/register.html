<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>添加物の登録</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<script th:src="@{/js/common.js}"></script>
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/additive', '添加物の登録')}"></header>
    
    <form id="registerForm" th:action="@{/additive/register}" method="post" th:object="${additiveForm}">
        <div th:replace="~{fragmentsinput :: field('添加物名', 'name', 'name')}"></div>
		<div＞ th:replace="~{fragmentsinput :: field('単位', 'unit', 'unit')}"></div>        
		<div th:replace="~{fragments/input :: radio-powder('種類', 'isPowder')}"></div>
			
		<button type="button" class="btn btn-action"
		        onclick="openConfirmModal('registerForm', 'confirmModal', 'confirmContent', 
				['regName'], ['添加物名'])">登録する</button>
    </form>
    
	<dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
