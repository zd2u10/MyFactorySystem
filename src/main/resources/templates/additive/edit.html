<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>添加物情報の編集</title>
<link rel="stylesheet" th:href="@{/css/material/material-common.css}" />
<script th:src="@{/js/common.js}"></script>
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/additive', '添加物情報の編集')}"></header>
    
	<div th:if="${message}" th:text="${message}" 
	     style="padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; background-color: #f9f9f9;">
	</div>
	
	<hr />
    
    <form id="editForm" th:action="@{/additive/edit/{id}(id=${id})}" method="post" th:object="${additiveForm}">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>添加物：</label>
            <input type="text" id="editName" th:field="*{name}" />
        </div>
        <div>
            <label>単位：</label>
            <input type="text" th:field="*{unit}" placeholder="例:kg,g,ml" />
        </div>
		
        <button type="button" 
			onclick="openConfirmModal(
				'editForm', 'editConfirmModal', 'editContent', 
				['editName'], ['添加物名'])">更新する</button>
    </form>
    
    <dialog id="editConfirmModal">
        <h3>更新情報の確認</h3>
        <p>以下の内容で更新しますか？</p>
        <div id="editContent" style="font-weight: bold; margin: 10px 0;"></div>
        <div class="modal-actions">
            <button type="button" onclick="submitForm('editForm')">更新確定</button>
            <button type="button" onclick="closeModal('editConfirmModal')" style="background-color: #ccc;">キャンセル</button>
        </div>
    </dialog>
</body>
</html>
