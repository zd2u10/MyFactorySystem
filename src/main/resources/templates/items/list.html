<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>製品一覧</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body>
    <header th:replace="~{fragments/common :: headerNav('/items', '製品一覧', 'list')}"></header>
    
    <table class="content-table">
        <thead><tr><th>製品名</th><th>販売単位</th><th>製造数</th><th>標準原価</th><th>販売価格</th><th>操作</th></tr></thead>
        <tbody>
            <tr th:each="item : ${itemList}">
                <td th:text="${item.name}"></td><td th:text="${item.salesUnit}"></td>
                <td th:text="${item.batchSize}"></td><td th:text="${item.standardCost}"></td>
                <td th:text="${item.salesPrice}"></td>
                <td><a th:href="@{/items/edit/{id}(id=${item.id})}" class="btn btn-edit">編集</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
