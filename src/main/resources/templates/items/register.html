<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>製品の新規登録</title>
	<link rel="stylesheet" th:href="@{/css/common.css}" />
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('/items', '製品の新規登録', 'register')}"></header>

	<form id="registerForm" th:action="@{/items/register}" method="post" th:object="${itemForm}">
	    <div th:replace="~{input :: text('製品名', 'name')}"></div>
	    <div th:replace="~{input :: text('販売単位', 'salesUnit')}"></div>
	    <div th:replace="~{input :: text('バッチ製造数', 'batchSize')}"></div>
	    <div th:replace="~{input :: text('標準原価', 'standardCost')}"></div>
	    <div th:replace="~{input :: text('販売価格', 'salesPrice')}"></div>

	    <button type="button" class="btn btn-action"
	        onclick="openConfirmModal('registerForm', 'confirmModal', 'confirmContent', ['regName'], ['製品名'])">登録する</button>
	</form>
	<dialog th:replace="~{input :: confirm-modal}"></dialog>
</body>
</html>
