<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製品情報の編集</title>
	<link rel="stylesheet" th:href="@{/css/common.css}" />
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
	<header th:replace="~{fragments/common :: headerNav('/items', '製品情報の編集', 'edit')}"></header>

	<form id="editForm" th:action="@{/items/edit/{id}(id=${id})}" method="post" th:object="${itemForm}">
	    
		
		<div th:replace="~{fragments/input :: text('製品名', 'name', 'editName')}"></div>
	    <div th:replace="~{fragments/input :: text('販売単位', 'salesUnit', 'editSalesUnit')}"></div>
	    <div th:replace="~{fragments/input :: text('バッチ製造数', 'batchSize', 'editBatchSize')}"></div>
	    <div th:replace="~{fragments/input :: text('標準原価', 'standardCost', 'editStandardCost')}"></div>
	    <div th:replace="~{fragments/input :: text('販売価格', 'salesPrice', 'editSalesPrice')}"></div>
		
		<input type="hidden" th:field="*{id}" />
		<input type="hidden" th:field="*{active}" />
		<input type="hidden" th:field="*{maxHydrationRate}" />
		<input type="hidden" th:field="*{minHydrationRate}" />
		
		
	    <button type="button" class="btn btn-action"
	        onclick="openConfirmModal('editForm', 'confirmModal', 'confirmContent', 
			['editName', 'editSalesUnit', 'editBatchSize', 'editStandardCost', 'editSalesPrice'], 
			['製品名', '販売単位', 'バッチ製造数', '標準原価', '販売価格'],'更新')">更新</button>
	</form>
	<dialog th:replace="~{fragments/input :: confirm-modal}"></dialog>
</body>
</html>
